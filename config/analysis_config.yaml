# Single-Cell RNA-seq Analysis Configuration

# ============================================================================
# QC PARAMETERS
# ============================================================================
qc:
  min_genes: 200
  max_genes: 5000
  max_mt_pct: 20
  max_rb_pct: 50
  min_cells_per_gene: 3
  min_counts_per_gene: 3

# ============================================================================
# NORMALIZATION & SCALING
# ============================================================================
normalization:
  method: "library_size"  # library_size or log_cpm
  target_sum: 10000
  log_transform: true

scaling:
  center: true
  scale: true
  max_value: 10

# ============================================================================
# FEATURE SELECTION
# ============================================================================
feature_selection:
  n_top_genes: 2000
  method: "seurat"  # seurat or scanpy
  flavor: "seurat"

# ============================================================================
# DIMENSIONALITY REDUCTION
# ============================================================================
pca:
  n_pcs: 50
  use_highly_variable: true

umap:
  n_neighbors: 15
  min_dist: 0.1
  metric: "euclidean"
  spread: 1.0

tsne:
  perplexity: 30
  learning_rate: 200

# ============================================================================
# CLUSTERING
# ============================================================================
clustering:
  method: "leiden"  # leiden or louvain
  resolution: 0.5
  random_state: 42
  n_iterations: -1

# ============================================================================
# DIFFERENTIAL EXPRESSION
# ============================================================================
differential_expression:
  method: "wilcoxon"  # wilcoxon, t-test, or mann-whitney
  min_pct: 0.25
  logfc_threshold: 0.25
  n_top_genes: 20

# ============================================================================
# CELL TYPE ANNOTATION
# ============================================================================
annotation:
  method: "markers"  # markers or reference
  marker_file: "data/metadata/marker_genes.csv"
  reference_file: null  # Path to reference AnnData object

# ============================================================================
# TRAJECTORY ANALYSIS
# ============================================================================
trajectory:
  method: "monocle3"  # monocle3 or diffusion
  n_neighbors: 15
  use_pca: true

# ============================================================================
# BATCH CORRECTION
# ============================================================================
batch_correction:
  apply: false
  method: "harmony"  # harmony or seurat
  batch_key: "sample"

# ============================================================================
# OUTPUT SETTINGS
# ============================================================================
output:
  save_processed_h5ad: true
  save_seurat_rds: true
  generate_report: true
  figure_format: "pdf"  # pdf or png
  figure_dpi: 300
