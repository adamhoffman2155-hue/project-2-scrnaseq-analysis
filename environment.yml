name: scrnaseq-analysis
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # R and Bioconductor
  - r-base=4.3.0
  - bioconductor-seurat=5.0.0
  - bioconductor-singlecellexperiment=1.22.0
  - bioconductor-scuttle=1.10.0
  - bioconductor-scran=1.28.0
  - bioconductor-scvelo=0.2.5
  - bioconductor-monocle3=1.3.1
  
  # R visualization
  - r-ggplot2=3.4.2
  - r-tidyverse=2.0.0
  - r-pheatmap=1.0.12
  - r-rcolorbrewer=1.1_3
  - r-plotly=4.10.1
  - r-shiny=1.7.4
  
  # Python
  - python=3.11
  - pandas=2.0.3
  - numpy=1.24.3
  - scipy=1.11.1
  - scikit-learn=1.3.0
  - matplotlib=3.7.2
  - seaborn=0.12.2
  
  # Single-cell Python packages
  - scanpy=1.9.3
  - anndata=0.9.2
  - loompy=3.0.7
  - harmonypy=0.0.9
  - bbknn=1.3.9
  - velocyto=0.17.17
  - scvelo=0.3.1
  - cellrank=1.9.1
  
  # Jupyter
  - jupyter=1.0.0
  - jupyterlab=4.0.4
  - ipywidgets=8.0.7
  - ipykernel=6.25.1
  
  # Utilities
  - git=2.41.0
  - wget=1.21.3
  - curl=8.2.1
  - h5py=3.9.0
  - pyyaml=6.0
